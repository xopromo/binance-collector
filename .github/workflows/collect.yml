name: Collect Binance Data

on:
  schedule:
    # Каждые 5 минут (минимальный интервал GitHub Actions)
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Ручной запуск из интерфейса GitHub

jobs:
  collect:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Start Tor proxy
        run: |
          sudo apt-get install -y tor -q
          sudo service tor start
          # Ждём пока Tor установит соединение
          for i in $(seq 1 12); do
            sleep 5
            if curl -s --socks5-hostname 127.0.0.1:9050 --max-time 10 https://check.torproject.org/api/ip 2>/dev/null | grep -q '"IsTor":true'; then
              echo "Tor connected successfully"
              break
            fi
            echo "Waiting for Tor... ($i/12)"
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Collect data
        run: python scripts/collect_data.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: $(date -u '+%Y-%m-%d %H:%M') UTC"
            git pull --rebase origin main 2>/dev/null || true
            git push origin HEAD
          fi

name: Collect Binance Data

on:
  schedule:
    # Каждые 5 минут (минимальный интервал GitHub Actions)
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Ручной запуск из интерфейса GitHub

jobs:
  collect:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Нужно для коммита данных обратно в репозиторий

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Collect data
        run: python scripts/collect_data.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Коммитим только если есть изменения
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: $(date -u '+%Y-%m-%d %H:%M') UTC"
            # Pull перед push на случай параллельных запусков
            git pull --rebase origin main || git pull --rebase origin master
            git push origin HEAD
          fi
